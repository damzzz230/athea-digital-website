<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts: preconnect + non-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" />

    <!-- Primary meta -->
    <title>Athea Digital — Premium Web Design, Johannesburg</title>
    <meta name="description" content="Athea Digital builds premium websites for Johannesburg businesses — salons, trades, restaurants, fitness, tattoo studios and more. See your site before you pay." />
    <meta name="robots" content="index, follow" />

    <!-- Canonical (updated per-page via JS) -->
    <link rel="canonical" href="https://athea.digital/" id="canonical-tag" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Athea Digital" />
    <meta property="og:url" content="https://athea.digital/" id="og-url" />
    <meta property="og:title" content="Athea Digital — Premium Web Design, Johannesburg" id="og-title" />
    <meta property="og:description" content="Premium web design for local businesses in Johannesburg. See your finished website before you spend a cent." id="og-description" />
    <meta property="og:image" content="https://athea.digital/images/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_ZA" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Athea Digital — Premium Web Design, Johannesburg" id="twitter-title" />
    <meta name="twitter:description" content="Premium web design for local businesses in Johannesburg. See your finished website before you spend a cent." id="twitter-description" />
    <meta name="twitter:image" content="https://athea.digital/images/og-image.png" />

    <!-- LocalBusiness structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Athea Digital",
      "description": "Premium web design studio for local businesses in Johannesburg. We build niche-specific websites for hair salons, restaurants, trades, fitness, tattoo studios, and auto detailing.",
      "url": "https://athea.digital",
      "email": "info@atheadigital.co.za",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Johannesburg",
        "addressRegion": "Gauteng",
        "addressCountry": "ZA"
      },
      "areaServed": {
        "@type": "City",
        "name": "Johannesburg"
      },
      "serviceType": [
        "Web Design",
        "Website Development",
        "Local Business Websites",
        "Mobile-First Web Design"
      ],
      "priceRange": "R3499 - R4999",
      "founder": [
        {
          "@type": "Person",
          "name": "Damian de Boer",
          "jobTitle": "Co-Founder & Design Lead"
        },
        {
          "@type": "Person",
          "name": "Dasendhran Subramoney",
          "jobTitle": "Co-Founder & Lead Developer"
        }
      ],
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
